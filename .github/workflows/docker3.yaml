name: Docker Multi-Arch Build and Push

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:
  build:
    name: Build and Push Multi-Arch
    runs-on: ubuntu-latest
    steps:
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        remove-android: 'true'
        remove-codeql: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Restart docker
      run: sudo systemctl restart docker

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Registry
      run: |
        echo "$ALIYUN_REGISTRY_PASSWORD" | docker login "$ALIYUN_REGISTRY" -u "$ALIYUN_REGISTRY_USER" --password-stdin

    - name: Process Images and Create Manifests
      run: |
        #!/bin/bash
        set -e

        if [ ! -f "images.txt" ]; then
          echo "❌ images.txt not found!"
          exit 1
        fi

        # 定义关联数组
        declare -A image_variants # key: "repo:tag", value: "list of local tagged images"
        declare -A platform_map   # key: "local_tagged_image", value: "platform string"
        
        echo "=== 📥 Phase 1: Pull, Tag, and Push Individual Architectures ==="
        
        while IFS= read -r line || [ -n "$line" ]; do
          [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
          
          # 解析行内容
          # 格式期望: --platform linux/amd64 registry/image:tag
          # 或者: registry/image:tag (默认为当前架构或无需指定)
          
          platform=""
          raw_image=""
          
          if [[ "$line" =~ --platform[=\ ]([^[:space:]]+) ]]; then
            platform="${BASH_REMATCH[1]}"
            # 提取最后一个参数作为镜像名
            raw_image=$(echo "$line" | awk '{print $NF}')
          else
            raw_image=$(echo "$line" | awk '{print $NF}')
          fi
          
          # 去除可能存在的 digest
          raw_image=$(echo "$raw_image" | sed 's/@.*//')
          
          # 提取基础名称 (去掉注册域和命名空间，只留 image:tag)
          # 假设输入是: docker.io/library/nginx:1.25 或 registry.cn-hangzhou.aliyuncs.com/my/ns/app:v1
          # 我们想要最终的目标标签是: $ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/<image_name>:<tag>
          
          # 解析原始镜像的 name:tag
          # 处理逻辑：找到最后一个 / 之后的部分
          image_name_tag=$(basename "$raw_image") 
          
          # 构造目标仓库地址 (统一推送到同一个阿里云仓库路径)
          target_repo="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$image_name_tag"
          
          echo "Processing: $raw_image (Platform: ${platform:-default}) -> Target: $target_repo"
          
          # 1. 拉取
          if [ -n "$platform" ]; then
            docker pull --platform "$platform" "$raw_image"
          else
            docker pull "$raw_image"
          fi
          
          # 2. 生成唯一的本地临时标签 (用于区分架构，防止冲突)
          # 格式: temp_arch_<platform_sanitized>_<random_id>
          safe_platform=$(echo "${platform:-single}" | tr '/' '_')
          temp_local_tag="temp_${safe_platform}_$$_$RANDOM"
          
          docker tag "$raw_image" "$temp_local_tag"
          
          # 3. 推送临时标签到阿里云 (作为中间步骤，确保远程有这些层)
          # 注意：这里我们先推送到一个临时的、带架构后缀的标签，或者直接推送到目标标签？
          # 策略修正：为了最终只有一个标签，我们需要先推送到远程的临时标签，然后合并。
          # 或者：直接推送到目标标签会覆盖。
          # 最佳实践：推送到远程的临时标签 (e.g., target_repo-temp-amd64)，最后合并删除。
          
          remote_temp_tag="${target_repo}-temp-${safe_platform}"
          docker tag "$temp_local_tag" "$remote_temp_tag"
          docker push "$remote_temp_tag"
          
          # 记录信息用于后续合并
          # key 是最终想要的目标标签 (target_repo), value 是远程临时标签列表
          if [ -z "${image_variants[$target_repo]}" ]; then
            image_variants[$target_repo]="$remote_temp_tag"
          else
            image_variants[$target_repo]="${image_variants[$target_repo]} $remote_temp_tag"
          fi
          
          # 记录平台信息 (如果需要显式注解)
          platform_map["$remote_temp_tag"]="$platform"
          
          # 清理本地
          docker rmi "$raw_image" "$temp_local_tag" "$remote_temp_tag" || true
          
        done < images.txt

        echo -e "\n=== 🧩 Phase 2: Create and Push Manifest Lists ==="
        
        for target_tag in "${!image_variants[@]}"; do
          variants=(${image_variants[$target_tag]})
          
          if [ ${#variants[@]} -eq 1 ]; then
            # 只有一个架构，直接重命名为最终标签
            echo "✅ Single arch detected for $target_tag, renaming..."
            src=${variants[0]}
            docker buildx imagetools create --tag "$target_tag" "$src"
            # 清理临时标签
            docker buildx imagetools rm "$src" 2>/dev/null || true
          else
            # 多个架构，创建 Manifest List
            echo "🌐 Creating multi-arch manifest for $target_tag from ${#variants[@]} variants..."
            
            # 使用 buildx imagetools create 自动合并
            # 它会自动检测远程镜像的架构信息，通常不需要手动 annotate
            cmd="docker buildx imagetools create --tag \"$target_tag\""
            for v in "${variants[@]}"; do
              cmd="$cmd \"$v\""
            done
            
            eval $cmd
            
            # 清理临时标签
            for v in "${variants[@]}"; do
              docker buildx imagetools rm "$v" 2>/dev/null || true
            done
          fi
        done

        echo -e "\n=== 🧹 Final Cleanup ==="
        docker system prune -af --filter "until=5m" || true
        df -h /
        echo "✨ All tasks completed successfully!"
