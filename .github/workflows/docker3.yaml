name: Docker Multi-Arch Build and Push

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:
  build:
    name: Build and Push Multi-Arch
    runs-on: ubuntu-latest
    steps:
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        remove-android: 'true'
        remove-codeql: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Restart docker
      run: sudo systemctl restart docker

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Registry
      run: |
        echo "$ALIYUN_REGISTRY_PASSWORD" | docker login "$ALIYUN_REGISTRY" -u "$ALIYUN_REGISTRY_USER" --password-stdin

    - name: Process Images and Create Manifests
      run: |
        #!/bin/bash
        set -e

        if [ ! -f "images.txt" ]; then
          echo "❌ images.txt not found!"
          exit 1
        fi

        declare -A image_variants # key: "final_target_tag", value: "list of remote temp tags"
        
        echo "=== 📥 Phase 1: Pull, Tag, and Push Individual Architectures ==="
        
        while IFS= read -r line || [ -n "$line" ]; do
          [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
          
          platform=""
          raw_image=""
          
          # 解析平台参数
          if [[ "$line" =~ --platform[=\ ]([^[:space:]]+) ]]; then
            platform="${BASH_REMATCH[1]}"
            raw_image=$(echo "$line" | awk '{print $NF}')
          else
            raw_image=$(echo "$line" | awk '{print $NF}')
          fi
          
          # 去除 digest
          raw_image=$(echo "$raw_image" | sed 's/@.*//')
          
          # 提取基础镜像名和标签 (image:tag)
          image_name_tag=$(basename "$raw_image") 
          
          # 分离名称和标签
          if [[ "$image_name_tag" == *":"* ]]; then
            img_name="${image_name_tag%:*}"
            img_tag="${image_name_tag##*:}"
          else
            img_name="$image_name_tag"
            img_tag="latest"
          fi
          
          # 构造最终目标仓库地址 (不带架构后缀)
          target_repo="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$img_name"
          final_target_tag="$target_repo:$img_tag"
          
          echo "Processing: $raw_image (Platform: ${platform:-default})"
          echo "  -> Final Target: $final_target_tag"
          
          # 1. 拉取
          if [ -n "$platform" ]; then
            docker pull --platform "$platform" "$raw_image"
          else
            docker pull "$raw_image"
          fi
          
          # 2. 生成本地临时标签
          safe_platform="unknown"
          arch_suffix=""
          
          if [ -n "$platform" ]; then
            # 格式化平台字符串：
            # linux/amd64 -> amd64
            # linux/arm64 -> arm64
            # linux/arm/v7 -> arm-v7 (或者保持 arm/v7，看你喜欢，这里替换 / 为 -)
            safe_platform=$(echo "$platform" | sed 's|linux/||' | tr '/' '-')
            arch_suffix="-${safe_platform}"
          else
            # 单架构不加后缀，或者你可以加个 -single
            arch_suffix="" 
          fi
          
          # 构造远程临时标签： <repo>:<tag>-<arch>
          # 例如: registry/namespace/app:v1.33.0-amd64
          remote_temp_tag="$target_repo:${img_tag}${arch_suffix}"
          
          echo "  -> Temp Tag: $remote_temp_tag"
          
          # 本地打标
          docker tag "$raw_image" "$remote_temp_tag"
          
          # 推送到远程临时标签
          docker push "$remote_temp_tag"
          
          # 记录到数组，用于后续合并
          # key 是最终标签，value 是临时标签列表
          if [ -z "${image_variants[$final_target_tag]}" ]; then
            image_variants[$final_target_tag]="$remote_temp_tag"
          else
            image_variants[$final_target_tag]="${image_variants[$final_target_tag]} $remote_temp_tag"
          fi
          
          # 清理本地
          docker rmi "$raw_image" "$remote_temp_tag" || true
          
        done < images.txt

        echo -e "\n=== 🧩 Phase 2: Create and Push Manifest Lists ==="
        
        for final_tag in "${!image_variants[@]}"; do
          variants=(${image_variants[$final_tag]})
          
          if [ ${#variants[@]} -eq 1 ]; then
            # 只有一个架构：直接将临时标签重命名为最终标签
            echo "✅ Single arch detected for $final_tag"
            echo "   Creating $final_tag from ${variants[0]}"
            
            docker buildx imagetools create --tag "$final_tag" "${variants[0]}"
            
            # 可选：如果不想保留带后缀的临时标签，可以删除它
            # docker buildx imagetools rm "${variants[0]}" 2>/dev/null || true
            # 注意：通常建议保留带后缀的标签以便调试，或者根据需求取消上面注释
            
          else
            # 多个架构：合并为 Manifest List
            echo "🌐 Creating multi-arch manifest for $final_tag"
            echo "   Sources: ${variants[*]}"
            
            cmd="docker buildx imagetools create --tag \"$final_tag\""
            for v in "${variants[@]}"; do
              cmd="$cmd \"$v\""
            done
            
            eval $cmd
            
            # 合并完成后，可以选择删除临时的带后缀标签，保持仓库整洁
            echo "   Cleaning up temp tags..."
            for v in "${variants[@]}"; do
              docker buildx imagetools rm "$v" 2>/dev/null || true
            done
          fi
        done

        echo -e "\n=== 🧹 Final Cleanup ==="
        docker system prune -af --filter "until=5m" || true
        df -h /
        echo "✨ All tasks completed successfully!"
