name: Docker Multi-Arch Sync

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:
  build:
    name: Pull and Sync Multi-Arch
    runs-on: ubuntu-latest
    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        df -hT

    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Restart docker
      run: sudo service docker restart

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        df -hT

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Enable Docker CLI experimental features
      run: |
        mkdir -p ~/.docker
        echo '{"experimental":"enabled"}' > ~/.docker/config.json

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push image Aliyun (Multi-Arch)
      shell: bash  # 👈 关键：强制使用 bash
      run: |
        set -euo pipefail  # 更严格的错误处理

        # 1. Login to Aliyun Registry
        echo "$ALIYUN_REGISTRY_PASSWORD" | docker login -u "$ALIYUN_REGISTRY_USER" --password-stdin "$ALIYUN_REGISTRY"

        # 2. Pre-scan for duplicate image names
        declare -A duplicate_images
        declare -A temp_map
        while IFS= read -r line || [[ -n "$line" ]]; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            
            image=$(echo "$line" | awk '{print $NF}')
            image="${image%%@*}"
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
            
            if [[ -n "${temp_map[$image_name]}" ]]; then
                if [[ "${temp_map[$image_name]}" != "$name_space" ]]; then
                    duplicate_images[$image_name]="true"
                fi
            else
                temp_map[$image_name]="$name_space"
            fi       
        done < images.txt
        
        # 3. Create temp file for manifest list
        MANIFEST_LIST_FILE=$(mktemp)
        echo "Created temp manifest list file: $MANIFEST_LIST_FILE"

        # 4. Main processing loop
        while IFS= read -r line || [[ -n "$line" ]]; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
        
            echo "----------------------------------------"
            echo "Processing: $line"
            
            platform=""
            if [[ "$line" =~ --platform[= ]([^ ]+) ]]; then
                platform="${BASH_REMATCH[1]}"
            fi
            
            clean_line=$(echo "$line" | sed -E 's/--platform[= ][^ ]+//g')
            image=$(echo "$clean_line" | awk '{print $NF}' | xargs)
            
            if [[ -z "$image" ]]; then
                echo "⚠️ Skipping invalid line: $line"
                continue
            fi

            echo "Detected Platform: ${platform:-default}"
            echo "Detected Image: $image"

            if [[ -n "$platform" ]]; then
                if ! docker pull --platform="$platform" "$image"; then
                    echo "❌ Failed to pull $image ($platform), skipping..."
                    continue
                fi
            else
                if ! docker pull "$image"; then
                    echo "❌ Failed to pull $image, skipping..."
                    continue
                fi
                platform="linux/amd64"
            fi

            platform_prefix="${platform//\//_}_"
            image_clean="${image%%@*}"
            image_name_tag=$(echo "$image_clean" | awk -F'/' '{print $NF}')
            name_space=$(echo "$image_clean" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')

            name_space_prefix=""
            if [[ -n "${duplicate_images[$image_name]}" ]] && [[ -n "$name_space" ]]; then
                name_space_prefix="${name_space}_"
            fi

            sub_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/${platform_prefix}${name_space_prefix}${image_name_tag}"
            target_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/${name_space_prefix}${image_name_tag}"

            echo "Tagging: $image_clean → $sub_image"
            docker tag "$image_clean" "$sub_image"
            echo "Pushing: $sub_image"
            docker push "$sub_image"

            echo "${target_image}|${sub_image}" >> "$MANIFEST_LIST_FILE"

            docker rmi "$image_clean" 2>/dev/null || true
            docker rmi "$sub_image" 2>/dev/null || true

            df -hT
            echo "----------------------------------------"
        done < images.txt

        # 5. Debug output
        echo "=========================================="
        echo "Manifest mapping content:"
        cat "$MANIFEST_LIST_FILE" || echo "(empty)"
        echo "=========================================="

        # 6. Create multi-arch manifests
        echo "Starting multi-arch manifest creation..."

        while IFS= read -r target || [[ -n "$target" ]]; do
            [[ -z "$target" ]] && continue
            echo "→ Processing manifest for: $target"

            mapfile -t subs < <(awk -F'|' -v t="$target" '$1 == t {print $2}' "$MANIFEST_LIST_FILE")
            count=${#subs[@]}

            if (( count < 2 )); then
                echo "  ⚠️ Only $count arch(s) for $target – skipping manifest."
                continue
            fi

            docker manifest rm "$target" 2>/dev/null || true

            cmd=(docker manifest create "$target")
            for sub in "${subs[@]}"; do
                cmd+=(--amend "$sub")
            done

            echo "  Executing: ${cmd[*]}"
            "${cmd[@]}"

            for sub in "${subs[@]}"; do
                base_name=$(basename "$sub")
                arch_prefix=$(echo "$base_name" | cut -d'_' -f1,2)

                arch=""
                case "$arch_prefix" in
                    linux_amd64)  arch="amd64" ;;
                    linux_arm64)  arch="arm64" ;;
                    linux_ppc64le) arch="ppc64le" ;;
                    linux_s390x)  arch="s390x" ;;
                    *)
                        echo "  ❓ Unknown arch prefix: $arch_prefix (in $sub)"
                        continue
                        ;;
                esac

                echo "  Annotating $sub → linux/$arch"
                docker manifest annotate "$target" "$sub" --os linux --arch "$arch"
            done

            echo "  Pushing manifest: $target"
            docker manifest push "$target"
            echo "  ✅ Success: $target is now multi-arch!"

        done < <(cut -d'|' -f1 "$MANIFEST_LIST_FILE" | sort -u)

        rm -f "$MANIFEST_LIST_FILE"
        echo "✅ All done! Multi-arch sync completed."
        df -hT
