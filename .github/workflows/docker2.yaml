name: Docker Multi-Arch Sync

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:
  build:
    name: Pull and Sync Multi-Arch
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Restart docker
      run: sudo service docker restart

    - name: Enable Docker experimental features
      run: |
        mkdir -p ~/.docker
        echo '{"experimental":"enabled"}' > ~/.docker/config.json

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Sync Multi-Arch Images to Aliyun
      shell: bash
      run: |
        set -euo pipefail
        echo "✅ Runner: $(uname -m) | Docker: $(docker --version | cut -d' ' -f3)"

        # ========== 1. Login ==========
        echo "$ALIYUN_REGISTRY_PASSWORD" | docker login -u "$ALIYUN_REGISTRY_USER" --password-stdin "$ALIYUN_REGISTRY"

        # ========== 2. Pre-scan duplicates (FIXED SYNTAX) ==========
        declare -A duplicate_images=()
        declare -A temp_map=()
        while IFS= read -r line || [[ -n "$line" ]]; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            
            # 提取纯净镜像名（不含@digest）
            image=$(echo "$line" | awk '{print $NF}' | sed 's/@.*//')
            
            # 安全提取 image_name（避免空值）
            image_name=$(echo "$image" | awk -F'[:/]' '{print $(NF-1)}' 2>/dev/null || echo "$image" | awk -F'/' '{print $NF}' | cut -d: -f1)
            [[ -z "$image_name" ]] && { echo "⚠️ Skip line (no image name): $line"; continue; }
            
            # 提取命名空间（清理空格）
            name_space=$(echo "$image" | awk -F'/' 'NF==3 {print $2} NF==2 {print $1}' | tr -d '[:space:]')
            
            # ✅ CRITICAL FIX: 拆分条件判断，避免 [[ ... && ... ]] 语法错误
            current_ns="${temp_map[$image_name]:-}"
            if [[ -n "$current_ns" ]]; then
                if [[ "$current_ns" != "$name_space" ]]; then
                    duplicate_images[$image_name]="1"
                fi
            else
                temp_map[$image_name]="$name_space"
            fi
        done < images.txt

        # ========== 3. Process images ==========
        MANIFEST_LIST_FILE=$(mktemp)
        echo "📄 Manifest list: $MANIFEST_LIST_FILE"
        
        while IFS= read -r line || [[ -n "$line" ]]; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            
            # 解析 platform 和 image
            platform=""
            if [[ "$line" =~ --platform[= ]([^[:space:]]+) ]]; then
                platform="${BASH_REMATCH[1]}"
            fi
            image=$(echo "$line" | sed -E 's/--platform[= ][^ ]+//g' | awk '{print $NF}' | xargs)
            [[ -z "$image" ]] && { echo "⚠️ Skip invalid line: $line"; continue; }
            
            echo "🔄 $image ${platform:+(platform=$platform)}"
            
            # 拉取镜像 + 获取真实架构
            if [[ -n "$platform" ]]; then
                docker pull --platform="$platform" "$image" || { echo "❌ Pull failed"; continue; }
                pulled_arch="${platform#*/}"
            else
                echo "⚠️ No --platform! Auto-detecting..."
                docker pull "$image" || { echo "❌ Pull failed"; continue; }
                pulled_arch=$(docker inspect "$image" -f '{{.Architecture}}' 2>/dev/null || echo "unknown")
                platform="linux/$pulled_arch"
                echo "🔍 Detected arch: $pulled_arch"
            fi
            
            # 构建目标镜像名
            image_clean="${image%%@*}"
            tag=$(echo "$image_clean" | awk -F':' '{print $NF}')
            base_name=$(echo "$image_clean" | awk -F'[:/]' '{print $(NF-1)}' 2>/dev/null || echo "$image_clean" | awk -F'/' '{print $NF}' | cut -d: -f1)
            ns=$(echo "$image_clean" | awk -F'/' 'NF==3 {print $2} NF==2 {print $1}' | tr -d '[:space:]')
            
            ns_prefix=""
            [[ -n "${duplicate_images[$base_name]:-}" && -n "$ns" ]] && ns_prefix="${ns}_"
            
            sub_img="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/linux_${pulled_arch}_${ns_prefix}${base_name}:${tag}"
            target_img="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/${ns_prefix}${base_name}:${tag}"
            
            docker tag "$image_clean" "$sub_img"
            docker push "$sub_img"
            echo "${target_img}|${sub_img}|${pulled_arch}" >> "$MANIFEST_LIST_FILE"
            
            docker rmi "$image_clean" "$sub_img" 2>/dev/null || true
        done < images.txt

        # ========== 4. Safety check ==========
        if [[ ! -s "$MANIFEST_LIST_FILE" ]]; then
            echo "⚠️ No valid images processed. Exiting cleanly."
            rm -f "$MANIFEST_LIST_FILE"
            exit 0
        fi
        echo -e "\n📋 Collected mappings:"
        cat "$MANIFEST_LIST_FILE"

        # ========== 5. Create manifests (SAFE LOOP) ==========
        echo -e "\n🚀 Creating multi-arch manifests..."
        while IFS= read -r target || [[ -n "$target" ]]; do
            [[ -z "$target" ]] && continue
            
            # 初始化数组（避免残留）
            declare -a subs=()
            declare -a archs=()
            
            while IFS='|' read -r t sub arch; do
                [[ "$t" == "$target" ]] || continue
                subs+=("$sub")
                archs+=("$arch")
            done < "$MANIFEST_LIST_FILE"
            
            if (( ${#subs[@]} < 2 )); then
                echo "⏭️  Skip $target (only ${#subs[@]} arch)"
                continue
            fi
            
            docker manifest rm "$target" 2>/dev/null || true
            docker manifest create "$target" "${subs[@]/#/--amend }" >/dev/null
            
            for i in "${!subs[@]}"; do
                echo "✏️  Annotate ${subs[$i]} → ${archs[$i]}"
                docker manifest annotate "$target" "${subs[$i]}" --os linux --arch "${archs[$i]}" 2>/dev/null || true
            done
            
            docker manifest push "$target" >/dev/null
            echo "✅ $target (archs: ${archs[*]})"
        done < <(cut -d'|' -f1 "$MANIFEST_LIST_FILE" | sort -u)

        rm -f "$MANIFEST_LIST_FILE"
        echo -e "\n🎉 SUCCESS: Multi-arch sync completed!"
