name: Docker Multi-Arch Sync

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:
  build:
    name: Pull and Sync Multi-Arch
    runs-on: ubuntu-latest
    steps:
    - name: Before freeing up disk space
      run: |
        echo "Before freeing up disk space"
        df -hT

    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Restart docker
      run: sudo service docker restart

    - name: Free up disk space complete
      run: |
        echo "Free up disk space complete"
        df -hT

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push image Aliyun (Multi-Arch)
      run: |
        # 1. 登录阿里云
        echo "$ALIYUN_REGISTRY_PASSWORD" | docker login -u "$ALIYUN_REGISTRY_USER" --password-stdin "$ALIYUN_REGISTRY"

        # 2. 数据预处理：判断镜像是否重名 (用于生成命名空间前缀)
        declare -A duplicate_images
        declare -A temp_map
        while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
            
            image=$(echo "$line" | awk '{print $NF}')
            image="${image%%@*}"
            image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}')
            name_space=$(echo "$image" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            name_space="${name_space}_"
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
            
            if [[ -n "${temp_map[$image_name]}" ]]; then
                 if [[ "${temp_map[$image_name]}" != "$name_space" ]]; then
                    duplicate_images[$image_name]="true"
                 fi
            else
                temp_map[$image_name]=$name_space
            fi       
        done < images.txt
        
        # 3. 创建一个临时文件来记录需要合并的镜像信息
        # 格式：TARGET_IMAGE|SUB_IMAGE
        MANIFEST_LIST_FILE=$(mktemp)
        echo "Created temp file for manifest tracking: $MANIFEST_LIST_FILE"

        # 4. 主循环：拉取、打标、推送
        while IFS= read -r line || [ -n "$line" ]; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^[[:space:]]*# ]] && continue
        
            echo "----------------------------------------"
            echo "Processing: $line"
            
            # --- 修正开始：正确解析 platform 和 image ---
            
            # 尝试提取 --platform 参数
            # 支持写法：--platform=linux/amd64 image 或 --platform linux/amd64 image
            platform=""
            if [[ "$line" =~ --platform[= ]([^ ]+) ]]; then
                platform="${BASH_REMATCH[1]}"
            fi
            
            # 提取镜像名 (去除 --platform 部分后的剩余内容，并去掉首尾空格)
            # 方法：将 line 中的 --platform... 替换为空，然后取最后一个字段
            clean_line=$(echo "$line" | sed -E 's/--platform[= ][^ ]+//g')
            image=$(echo "$clean_line" | awk '{print $NF}' | xargs) # xargs 用于去除首尾空格
            
            if [ -z "$image" ]; then
                echo "Error: Could not parse image name from line: $line"
                continue
            fi

            echo "Detected Platform: ${platform:-'default'}"
            echo "Detected Image: $image"

            # 执行拉取
            if [ -n "$platform" ]; then
                echo "Running: docker pull --platform=$platform $image"
                if ! docker pull --platform="$platform" "$image"; then
                    echo "Error pulling $image with platform $platform, skipping..."
                    continue
                fi
            else
                echo "Running: docker pull $image"
                if ! docker pull "$image"; then
                    echo "Error pulling $image, skipping..."
                    continue
                fi
            fi
            # --- 修正结束 ---

            # 解析平台前缀 (用于后续打标)
            if [ -z "$platform" ]; then
                platform="linux/amd64" # 默认
                platform_prefix="linux_amd64_"
            else
                platform_prefix="${platform//\//_}_"
            fi
            
            # 解析镜像名称组件 (逻辑保持不变，但使用解析后的 $image)
            image_clean="${image%%@*}" # 去除 @sha256
            image_name_tag=$(echo "$image_clean" | awk -F'/' '{print $NF}')
            name_space=$(echo "$image_clean" | awk -F'/' '{if (NF==3) print $2; else if (NF==2) print $1; else print ""}')
            image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
        
            name_space_prefix=""
            # 注意：duplicate_images 逻辑依赖于之前的预处理，这里假设它依然有效
            if [[ -n "${duplicate_images[$image_name]}" ]]; then
               if [[ -n "$name_space" ]]; then
                  name_space_prefix="${name_space}_"
               fi
            fi
            
            image_name_tag="${image_name_tag%%@*}"
            
            # 构造目标镜像名 (带架构前缀)
            sub_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/${platform_prefix}${name_space_prefix}${image_name_tag}"
            
            # 构造最终用户使用的目标镜像名 (不带架构前缀，用于合并)
            target_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/${name_space_prefix}${image_name_tag}"

            echo "Tagging: $image_clean -> $sub_image"
            docker tag "$image_clean" "$sub_image"
            
            echo "Pushing sub-image: $sub_image"
            docker push "$sub_image"
            
            # 记录到临时文件
            echo "${target_image}|${sub_image}" >> "$MANIFEST_LIST_FILE"

            # 本地清理
            echo "Cleaning up local images: $image_clean and $sub_image"
            docker rmi "$image_clean" || true
            docker rmi "$sub_image" || true
            
            df -hT
            echo "----------------------------------------"
            
        done < images.txt

        # 5. 合并阶段：创建 Manifest List
        echo "=========================================="
        echo "Start creating Multi-Arch Manifest Lists"
        echo "=========================================="
        
        # 获取所有唯一的目标镜像 (target_image)
        cut -d'|' -f1 "$MANIFEST_LIST_FILE" | sort -u | while read -r target; do
            if [ -z "$target" ]; then continue; fi
            
            echo "Processing Manifest for: $target"
            
            # 获取该目标镜像对应的所有子镜像 (sub_images)
            # 过滤出属于这个 target 的所有行
            subs=$(grep "^${target}|" "$MANIFEST_LIST_FILE" | cut -d'|' -f2)
            
            # 计数，如果只有一个架构，不需要创建 manifest (或者也可以创建，但没必要)
            count=$(echo "$subs" | wc -l)
            if [ "$count" -lt 2 ]; then
                echo "Only 1 architecture found for $target, skipping manifest creation. (You may want to rename the image manually if you want it without prefix)"
                # 可选策略：如果只有一个架构，是否要把它重命名为不带前缀的名字？
                # 这里我们保持现状：单架构镜像保留前缀，多架构才会生成无前缀的合并镜像。
                # 如果你希望单架构也去掉前缀，可以在这里加一个 docker tag 和 push
                continue
            fi
            
            # 创建 manifest
            # 先删除可能存在的本地 manifest (防止报错)
            docker manifest rm "$target" 2>/dev/null || true
            
            cmd="docker manifest create $target"
            for sub in $subs; do
                cmd="$cmd --amend $sub"
            done
            
            echo "Executing: $cmd"
            eval $cmd
            
            # 注解架构信息 (Annotate)
            for sub in $subs; do
                # 从子镜像名中提取架构前缀，例如 linux_amd64_... -> amd64
                # 子镜像格式: registry/namespace/linux_amd64_name:tag
                arch_prefix=$(echo "$sub" | awk -F'/' '{print $NF}' | awk -F'_' '{print $1 "_" $2}') # 获取 linux_amd64 或 linux_arm64
                
                arch=""
                if [[ "$arch_prefix" == "linux_amd64" ]]; then
                    arch="amd64"
                elif [[ "$arch_prefix" == "linux_arm64" ]]; then
                    arch="arm64"
                elif [[ "$arch_prefix" == "linux_ppc64le" ]]; then
                    arch="ppc64le"
                elif [[ "$arch_prefix" == "linux_s390x" ]]; then
                    arch="s390x"
                else
                    echo "Warning: Unknown architecture prefix $arch_prefix for $sub"
                    continue
                fi
                
                echo "Annotating $sub as arch: $arch"
                docker manifest annotate "$target" "$sub" --arch "$arch" --os linux
            done
            
            # 推送 Manifest
            echo "Pushing manifest list: $target"
            docker manifest push "$target"
            
            echo "✅ Success: $target now supports multiple architectures."
        done

        # 6. 最终清理
        rm -f "$MANIFEST_LIST_FILE"
        echo "Manifest sync completed."
        df -hT
