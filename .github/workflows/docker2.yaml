name: Docker Multi-Arch Build and Push

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:
  build:
    name: Build and Push Multi-Arch
    runs-on: ubuntu-latest
    steps:
    - name: Before freeing up disk space
      run: df -hT

    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        remove-android: 'true'
        remove-codeql: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Restart docker
      run: sudo systemctl restart docker

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3
      with:
        platforms: linux/amd64,linux/arm64,linux/arm/v7

    - name: Login to Registry
      run: docker login -u "$ALIYUN_REGISTRY_USER" -p "$ALIYUN_REGISTRY_PASSWORD" "$ALIYUN_REGISTRY"

    - name: Build and push multi-arch images
      run: |
        # 初始化关联数组（bash 4.0+ 支持）
        declare -A duplicate_images temp_map multi_arch_manifests multi_arch_variants
        declare -a multi_arch_local_images

        # ===== 阶段1：分析镜像结构 =====
        while IFS= read -r line || [ -n "$line" ]; do
          [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
          
          # 提取原始镜像引用（移除digest）
          image=$(echo "$line" | awk '{print $NF}' | sed 's/@.*//')
          platform=$(echo "$line" | grep -oP '(?<=--platform[= ])[^[:space:]]+' || echo "")
          image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}' | sed 's/@.*//')
          image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
          name_space=$(echo "$image" | awk -F'/' '{if(NF==3)print $2; else if(NF==2)print $1; else print ""}')
          
          # 检测重名（添加命名空间前缀防冲突）
          ns_key="${name_space:-default}_"
          [[ -n "${temp_map[$image_name]}" && "${temp_map[$image_name]}" != "$ns_key" ]] && duplicate_images[$image_name]="true"
          temp_map[$image_name]="$ns_key"
          
          # 标记需创建manifest的镜像（含平台参数即为多架构变体）
          [[ -n "$platform" ]] && multi_arch_manifests[$image_name]="true"
        done < images.txt

        # ===== 阶段2：拉取、重命名、推送 =====
        while IFS= read -r line || [ -n "$line" ]; do
          [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
          echo ">>> Processing: $line"
          
          # 拉取镜像（保留--platform参数）
          docker pull $line 2>&1 | grep -v "WARNING" || true
          
          # 解析关键信息
          platform=$(echo "$line" | grep -oP '(?<=--platform[= ])[^[:space:]]+' || echo "")
          image=$(echo "$line" | awk '{print $NF}' | sed 's/@.*//')
          image_name_tag=$(echo "$image" | awk -F'/' '{print $NF}' | sed 's/@.*//')
          image_name=$(echo "$image_name_tag" | awk -F':' '{print $1}')
          name_space=$(echo "$image" | awk -F'/' '{if(NF==3)print $2; else if(NF==2)print $1; else print ""}')
          
          # 构建新标签（平台前缀 + 命名空间前缀防冲突）
          platform_prefix="${platform//\//_}_"
          ns_prefix=$([[ -n "${duplicate_images[$image_name]}" && -n "$name_space" ]] && echo "${name_space//-/_}_" || echo "")
          new_tag="${platform_prefix}${ns_prefix}${image_name_tag}"
          new_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$new_tag"
          
          # 重命名并推送
          docker tag "$image" "$new_image" 2>&1 | grep -v "WARNING" || true
          docker push "$new_image" 2>&1 | grep -v "WARNING" || true
          
          # 智能清理策略
          if [[ -n "${multi_arch_manifests[$image_name]}" && -n "$platform" ]]; then
            # 多架构变体：保留推送后的镜像供manifest使用
            multi_arch_variants["${image_name}|${platform}"]="$new_image"
            multi_arch_local_images+=("$new_image")
            docker rmi "$image" 2>/dev/null || true  # 仅删原始镜像
          else
            # 单架构镜像：立即清理
            docker rmi "$image" "$new_image" 2>/dev/null || true
          fi
          
          # 定期深度清理（防磁盘爆满）
          if [[ $(docker images -q | wc -l) -gt 10 ]]; then
            docker system prune -af --filter "until=1h" 2>/dev/null | true
          fi
          df -h / | tail -n 2
        done < images.txt

        # ===== 阶段3：创建并推送 Manifest List =====
        echo -e "\n=== 🌐 Creating Multi-Arch Manifests ==="
        for base_name in "${!multi_arch_manifests[@]}"; do
          variants=() platforms=()
          
          # 精确收集该基础镜像的所有变体
          for key in "${!multi_arch_variants[@]}"; do
            if [[ "$key" == "$base_name|"* ]]; then
              platform="${key#"$base_name|"}"  # 提取原始平台字符串 (如: linux/arm64)
              variants+=("${multi_arch_variants[$key]}")
              platforms+=("$platform")
            fi
          done
          
          [[ ${#variants[@]} -eq 0 ]] && continue
          
          # 使用原镜像标签（从第一个变体提取标签部分）
          tag=$(echo "${variants[0]}" | awk -F':' '{print $NF}')
          target_manifest="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/$base_name:$tag"
          
          echo "📦 Creating manifest: $target_manifest (${#variants[@]} variants)"
          docker manifest create "$target_manifest" "${variants[@]}" 2>&1 | grep -v "WARNING" || true
          
          # 精确注解：拆分 os/arch/variant
          for i in "${!platforms[@]}"; do
            p="${platforms[$i]}"
            if [[ "$p" == */*/* ]]; then
              os="${p%%/*}"; rest="${p#*/}"; arch="${rest%%/*}"; variant="${rest##*/}"
              docker manifest annotate "$target_manifest" "${variants[$i]}" \
                --os "$os" --arch "$arch" --variant "$variant" 2>&1 | grep -v "WARNING" || true
            else
              os="${p%%/*}"; arch="${p##*/}"
              docker manifest annotate "$target_manifest" "${variants[$i]}" \
                --os "$os" --arch "$arch" 2>&1 | grep -v "WARNING" || true
            fi
          done
          
          docker manifest push "$target_manifest" 2>&1 | grep -v "WARNING" || true
          echo "✅ Manifest pushed: $target_manifest"
        done

        # ===== 阶段4：最终清理 =====
        echo -e "\n=== 🧹 Final Cleanup ==="
        for img in "${multi_arch_local_images[@]}"; do
          docker rmi "$img" 2>/dev/null || true
        done
        docker system prune -af --filter "until=10m" 2>/dev/null | true
        df -h / | tail -n 2
        echo "✨ All tasks completed successfully!"
