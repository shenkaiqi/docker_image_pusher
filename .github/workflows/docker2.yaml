name: Docker Multi-Arch Sync

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  ALIYUN_REGISTRY: "${{ secrets.ALIYUN_REGISTRY }}"
  ALIYUN_NAME_SPACE: "${{ secrets.ALIYUN_NAME_SPACE }}"
  ALIYUN_REGISTRY_USER: "${{ secrets.ALIYUN_REGISTRY_USER }}"
  ALIYUN_REGISTRY_PASSWORD: "${{ secrets.ALIYUN_REGISTRY_PASSWORD }}"

jobs:
  build:
    name: Pull and Sync Multi-Arch
    runs-on: ubuntu-latest
    steps:
    - name: Before freeing up disk space
      run: df -hT

    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 128
        remove-dotnet: 'true'
        remove-haskell: 'true'
        build-mount-path: '/var/lib/docker/'

    - name: Restart docker
      run: sudo service docker restart

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Enable Docker CLI experimental features
      run: |
        mkdir -p ~/.docker
        echo '{"experimental":"enabled"}' > ~/.docker/config.json

    - name: Docker Setup Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push image Aliyun (Multi-Arch)
      shell: bash
      run: |
        set -euo pipefail
        echo "✅ Runner architecture: $(uname -m)"
        echo "✅ Docker version: $(docker --version)"

        # 1. Login
        echo "$ALIYUN_REGISTRY_PASSWORD" | docker login -u "$ALIYUN_REGISTRY_USER" --password-stdin "$ALIYUN_REGISTRY"

        # 2. Pre-scan duplicates (SAFE ARRAY ACCESS)
        declare -A duplicate_images=()
        declare -A temp_map=()
        while IFS= read -r line || [[ -n "$line" ]]; do
            [[ -z "$line" ]] || [[ "$line" =~ ^[[:space:]]*# ]] && continue
            image=$(echo "$line" | awk '{print $NF}' | sed 's/@.*//')
            image_name=$(echo "$image" | awk -F'[:/]' '{print $(NF-1)}' 2>/dev/null || echo "$image" | awk -F'/' '{print $NF}' | cut -d: -f1)
            name_space=$(echo "$image" | awk -F'/' 'NF==3 {print $2} NF==2 {print $1}' | tr -d '[:space:]')
            
            current_ns="${temp_map[$image_name]:-}"
            if [[ -n "$current_ns" && "$current_ns" != "$name_space" ]]; then
                duplicate_images[$image_name]="1"
            elif [[ -z "$current_ns" ]]; then
                temp_map[$image_name]="$name_space"
            fi
        done < images.txt

        # 3. Process images
        MANIFEST_LIST_FILE=$(mktemp)
        echo "📄 Manifest list file: $MANIFEST_LIST_FILE"
        
        while IFS= read -r line || [[ -n "$line" ]]; do
            [[ -z "$line" ]] || [[ "$line" =~ ^[[:space:]]*# ]] && continue
            
            # Parse platform safely
            platform=""
            if [[ "$line" =~ --platform[= ]([^[:space:]]+) ]]; then
                platform="${BASH_REMATCH[1]}"
            fi
            
            image=$(echo "$line" | sed -E 's/--platform[= ][^ ]+//g' | awk '{print $NF}' | xargs)
            [[ -z "$image" ]] && { echo "⚠️ Skip invalid line: $line"; continue; }
            
            echo "🔄 Processing: $image ${platform:+(platform=$platform)}"
            
            # CRITICAL FIX: Detect actual pulled architecture if platform not specified
            if [[ -n "$platform" ]]; then
                docker pull --platform="$platform" "$image" || { echo "❌ Pull failed, skip"; continue; }
                pulled_arch="${platform#*/}"  # Extract 'amd64' from 'linux/amd64'
            else
                echo "⚠️ WARNING: No --platform specified! Auto-detecting architecture (may be unreliable)"
                docker pull "$image" || { echo "❌ Pull failed, skip"; continue; }
                # Get actual architecture of pulled image
                pulled_arch=$(docker inspect "$image" -f '{{.Architecture}}' 2>/dev/null || echo "amd64")
                platform="linux/$pulled_arch"
                echo "🔍 Auto-detected architecture: $pulled_arch"
            fi

            # Build tags
            platform_prefix="${platform//\//_}_"
            image_clean="${image%%@*}"
            image_tag=$(echo "$image_clean" | awk -F':' '{print $NF}')
            image_base=$(echo "$image_clean" | awk -F'[:/]' '{print $(NF-1)}' 2>/dev/null || echo "$image_clean" | awk -F'/' '{print $NF}' | cut -d: -f1)
            name_space=$(echo "$image_clean" | awk -F'/' 'NF==3 {print $2} NF==2 {print $1}' | tr -d '[:space:]')
            
            ns_prefix=""
            [[ -n "${duplicate_images[$image_base]:-}" && -n "$name_space" ]] && ns_prefix="${name_space}_"
            
            sub_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/${platform_prefix}${ns_prefix}${image_base}:${image_tag}"
            target_image="$ALIYUN_REGISTRY/$ALIYUN_NAME_SPACE/${ns_prefix}${image_base}:${image_tag}"
            
            docker tag "$image_clean" "$sub_image"
            docker push "$sub_image"
            echo "${target_image}|${sub_image}|${pulled_arch}" >> "$MANIFEST_LIST_FILE"
            
            docker rmi "$image_clean" "$sub_image" 2>/dev/null || true
        done < images.txt

        # 4. DEBUG: Show collected data
        echo -e "\n📋 Manifest mappings:"
        [[ -s "$MANIFEST_LIST_FILE" ]] && cat "$MANIFEST_LIST_FILE" || echo "(No valid images processed)"
        
        # 5. CRITICAL FIX: Handle empty manifest file safely
        if [[ ! -s "$MANIFEST_LIST_FILE" ]]; then
            echo "⚠️ No images to merge into manifests. Skipping manifest creation."
            rm -f "$MANIFEST_LIST_FILE"
            echo "✅ Sync completed (no multi-arch manifests created)"
            exit 0
        fi

        # 6. Create manifests (SAFE LOOP)
        echo -e "\n🚀 Creating multi-arch manifests..."
        while IFS= read -r target || [[ -n "$target" ]]; do
            [[ -z "$target" ]] && continue
            
            # SAFE: Use awk to extract subs + arch, avoid mapfile on empty input
            while IFS='|' read -r _ sub arch; do
                [[ "$_" == "$target" ]] || continue
                subs+=("$sub")
                archs+=("$arch")
            done < "$MANIFEST_LIST_FILE"
            
            count=${#subs[@]}
            if (( count < 2 )); then
                echo "⏭️  Skip $target (only $count arch)"
                unset subs archs
                continue
            fi
            
            docker manifest rm "$target" 2>/dev/null || true
            docker manifest create "$target" "${subs[@]/#/--amend }" >/dev/null
            
            for i in "${!subs[@]}"; do
                echo "✏️  Annotate ${subs[$i]} → ${archs[$i]}"
                docker manifest annotate "$target" "${subs[$i]}" --os linux --arch "${archs[$i]}" 2>/dev/null || true
            done
            
            docker manifest push "$target" >/dev/null
            echo "✅ $target (archs: ${archs[*]})"
            
            unset subs archs
        done < <(cut -d'|' -f1 "$MANIFEST_LIST_FILE" | sort -u)

        rm -f "$MANIFEST_LIST_FILE"
        echo -e "\n🎉 ALL DONE! Multi-arch sync completed successfully."
